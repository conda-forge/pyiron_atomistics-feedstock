schema_version: 1

context:
  name: pyiron_atomistics
  version: "0.8.7"
  python_min: 3.11

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/${{ name[0] }}/${{ name }}/${{ name }}-${{ version }}.tar.gz
  sha256: c9aa1668a358db5cec5dac5149645205e2e0eba90c467241480ae6b9257ee0ed

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - ase
    - atomistics
    - defusedxml
    - h5py
    - matplotlib-base
    - mendeleev
    - mp-api
    - numpy
    - pandas
    - phonopy
    - pint
    - pyiron_lammps
    - pyiron_base
    - pyiron_snippets
    - pyiron_vasp
    - pylammpsmpi
    - pyscal3
    - scipy
    - scikit-learn
    - seekpath
    - spglib
    - structuretoolkit
    - hatchling
    - hatch-vcs
    - sphinx_parser
  run:
    - python >=${{ python_min }},<3.14
    - ase >=3.23.0,<=3.27.0
    - assyst >=0.9.0,<=0.11.0
    - atomistics >=0.3.0,<=0.3.5
    - defusedxml >=0.7.0,<=0.7.1
    - h5py >=3.12.1,<=3.15.1
    - matplotlib-base >=3.9.1,<=3.10.8
    - mendeleev =1.1.0
    - mp-api >=0.37.0,<=0.45.15
    - numpy >=2.2.1,<=2.3.5
    - pandas >=2.2.3,<=2.3.3
    - phonopy >=2.26.6,<=2.47.1
    - pint >=0.24.4,<=0.25.2
    - pyiron_base >=0.15.4,<=0.15.12
    - pyiron_lammps >=0.3.2,<=0.5.2
    - pyiron_snippets >=1.0.1,<=1.0.2
    - pyiron_vasp >=0.2.2,<=0.2.18
    - pylammpsmpi >=0.2.36,<=0.3.8
    - pyscal3 >=3.2.5,<=3.3.0
    - scipy >=1.15.0,<=1.16.3
    - scikit-learn >=1.4.2,<=1.8.0
    - seekpath >=1.9.5,<=2.1.0
    - spglib >=2.5.0,<=2.7.0
    - structuretoolkit >=0.0.35,<=0.0.39
    - sphinx_parser =0.1.6

tests:
  - python:
      imports:
        - pyiron_atomistics
      pip_check: true

      python_version: ${{ python_min }}.*
about:
  summary: pyiron - an integrated development environment (IDE) for computational materials science.
  license: BSD-3-Clause
  license_file: LICENSE
  homepage: https://github.com/pyiron/pyiron_atomistics

extra:
  recipe-maintainers:
    - niklassiemer
    - srmnitc
    - pyiron-runner
    - jan-janssen
    - pmrv
